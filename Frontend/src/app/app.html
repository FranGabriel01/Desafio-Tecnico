<!-- ========== LAYOUT PRINCIPAL ========== -->
<!-- El padre (App) coordina los 3 componentes hijos pasándoles datos y escuchando eventos -->

<div class="contenedor" [class.modo-oscuro]="modoOscuro">

  <!-- ========== 1. SIDEBAR (componente hijo) ========== -->
  <!-- Le pasamos datos con [] y escuchamos eventos con () -->
  <app-sidebar
    [localidades]="localidades"
    [cargandoLocalidades]="cargandoLocalidades"
    [modoOscuro]="modoOscuro"
    [localidadSeleccionada]="localidadSeleccionada"
    (alSeleccionarLocalidad)="seleccionarLocalidad($event)"
    (alTraerOferta)="traerOferta()"
    (alBorrarTodo)="borrarTodo()"
    (alToggleModoOscuro)="toggleModoOscuro()">
  </app-sidebar>

  <!-- ========== 2. CONTENIDO PRINCIPAL ========== -->
  <!-- Los tabs y las cards siguen en el padre porque el padre maneja el tab activo -->
  <main class="contenido-principal">

    <!-- TABS -->
    <div class="tabs">
      <button
        [class.tab-activo]="tabActivo === 'Combo'"
        (click)="tabActivo = 'Combo'">
        Combos
      </button>
      <button
        [class.tab-activo]="tabActivo === 'Tv'"
        (click)="tabActivo = 'Tv'">
        Flow
      </button>
      <button
        [class.tab-activo]="tabActivo === 'Internet'"
        (click)="tabActivo = 'Internet'">
        Personal
      </button>
      <button
        class="tab-carrito"
        (click)="carritoAbierto = !carritoAbierto">
        Carrito ({{ carrito.length }})
      </button>
    </div>

    <!-- MENSAJE DE ERROR (si falla alguna petición HTTP) -->
    <div *ngIf="mensajeError" class="mensaje-error">
      <span>⚠️ {{ mensajeError }}</span>
      <button class="btn-cerrar-error" (click)="mensajeError = ''">✕</button>
    </div>

    <!-- INDICADOR DE CARGA DE PRODUCTOS -->
    <div *ngIf="cargandoProductos" class="cargando-productos">
      <p>⏳ Cargando ofertas...</p>
    </div>

    <!-- LISTA DE PRODUCTOS -->
    <div class="lista-productos" *ngIf="!cargandoProductos">
      <!-- Mensaje cuando no hay ningún producto cargado -->
      <div *ngIf="productos.length === 0" class="sin-productos">
        <p>No hay ofertas disponibles. Seleccione una localidad y presione "Traer Oferta".</p>
      </div>

      <!-- Mensaje cuando hay productos pero el tab actual está vacío -->
      <div *ngIf="productos.length > 0 && obtenerProductosPorTipo(tabActivo).length === 0" class="sin-productos">
        <p>No hay ofertas de tipo {{ tabActivo === 'Combo' ? 'Combo' : tabActivo === 'Tv' ? 'Flow' : 'Personal' }} para esta zona.</p>
      </div>

      <!-- CARD DE PRODUCTO (componente hijo, se repite por cada producto) -->
      <!-- Cada card recibe SU producto, SUS adicionales y el estado del carrito -->
      <app-card-producto
        *ngFor="let producto of obtenerProductosPorTipo(tabActivo)"
        [producto]="producto"
        [adicionales]="obtenerAdicionalesParaProducto(producto.tipo)"
        [estaEnCarrito]="productoEnCarrito(producto.id)"
        [adicionalesEnCarrito]="obtenerIdsAdicionalesEnCarrito()"
        (alAgregarProducto)="agregarProductoAlCarrito($event)"
        (alAgregarAdicional)="agregarAdicionalAlCarrito($event)">
      </app-card-producto>
    </div>
  </main>

  <!-- ========== 3. CARRITO (componente hijo) ========== -->
  <!-- Solo se muestra cuando carritoAbierto es true -->
  <app-carrito
    *ngIf="carritoAbierto"
    [carrito]="carrito"
    [precioListaTotal]="calcularPrecioListaTotal()"
    [primeraFactura]="calcularPrimeraFactura()"
    [ahorroTotal]="calcularAhorroTotal()"
    (alCerrar)="carritoAbierto = false"
    (alEliminarItem)="eliminarDelCarrito($event)"
    (alVaciarCarrito)="vaciarCarrito()">
  </app-carrito>

  <!-- ========== 4. TOAST (notificaciones) ========== -->
  <!-- Dentro del contenedor para que detecte .modo-oscuro con :host-context -->
  <app-toast #toast></app-toast>

  <!-- ========== 5. MODAL DE CONFIRMACIÓN ========== -->
  <!-- Dentro del contenedor para que detecte .modo-oscuro con :host-context -->
  <app-modal-confirmacion #modalConfirmacion></app-modal-confirmacion>

</div>
